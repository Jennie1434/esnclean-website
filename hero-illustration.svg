<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#EDE6DA"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#E2C97E"/>
      <stop offset="45%" stop-color="#C4A055"/>
      <stop offset="100%" stop-color="#9E7A38"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#EDD488"/>
      <stop offset="50%" stop-color="#CEAA60"/>
      <stop offset="100%" stop-color="#A88040"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F8F5F0"/>
      <stop offset="60%" stop-color="#F0EBE3"/>
      <stop offset="100%" stop-color="#E6E0D6"/>
    </linearGradient>
    <linearGradient id="towelTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEE9E2"/>
    </linearGradient>
    <linearGradient id="towelBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8F5F0"/>
      <stop offset="100%" stop-color="#E8E2D8"/>
    </linearGradient>
    <linearGradient id="vase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DDD8D0"/>
      <stop offset="40%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0CBC3"/>
    </linearGradient>
    <radialGradient id="ambient" cx="55%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0000000F"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000010"/>
    </filter>
    <clipPath id="roundedClip">
      <rect width="800" height="620" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="url(#bg)"/>
  <rect width="800" height="620" fill="url(#ambient)"/>

  <!-- Decorative circles (background) -->
  <circle cx="490" cy="260" r="230" fill="none" stroke="#C8A85A" stroke-width="0.6" opacity="0.18"/>
  <circle cx="490" cy="260" r="195" fill="none" stroke="#C8A85A" stroke-width="0.4" opacity="0.12"/>
  <circle cx="680" cy="110" r="45" fill="none" stroke="#C8A85A" stroke-width="0.8" opacity="0.2"/>
  <circle cx="680" cy="110" r="33" fill="none" stroke="#C8A85A" stroke-width="0.5" opacity="0.14"/>
  <circle cx="90" cy="500" r="60" fill="none" stroke="#C8A85A" stroke-width="0.6" opacity="0.12"/>

  <!-- Gold dots scattered -->
  <circle cx="310" cy="300" r="2.2" fill="#C8A85A" opacity="0.25"/>
  <circle cx="320" cy="316" r="1.5" fill="#C8A85A" opacity="0.18"/>
  <circle cx="735" cy="200" r="2" fill="#C8A85A" opacity="0.22"/>
  <circle cx="745" cy="215" r="1.5" fill="#C8A85A" opacity="0.16"/>
  <circle cx="155" cy="330" r="1.8" fill="#C8A85A" opacity="0.2"/>

  <!-- ─── MARBLE TABLE SURFACE ─── -->
  <rect x="0" y="418" width="800" height="202" fill="url(#marble)"/>
  <!-- Table edge highlight -->
  <rect x="0" y="418" width="800" height="3" fill="white" opacity="0.55"/>
  <line x1="0" y1="421" x2="800" y2="421" stroke="#C8C0B4" stroke-width="0.8" opacity="0.3"/>
  <!-- Marble veins -->
  <path d="M 0 445 Q 120 438 280 450 Q 420 460 580 442 Q 700 435 800 448"
        fill="none" stroke="#C4BEB6" stroke-width="0.9" opacity="0.35"/>
  <path d="M 0 480 Q 90 475 200 488 Q 360 500 520 482 Q 660 470 800 485"
        fill="none" stroke="#BCB6AE" stroke-width="0.7" opacity="0.28"/>
  <path d="M 60 525 Q 200 518 380 530 Q 540 540 700 522 Q 760 518 800 525"
        fill="none" stroke="#B4AEA6" stroke-width="0.6" opacity="0.22"/>
  <path d="M 0 560 Q 150 554 320 565 Q 480 574 640 558 Q 730 550 800 560"
        fill="none" stroke="#B0AAA2" stroke-width="0.5" opacity="0.18"/>
  <!-- Subtle table reflection -->
  <rect x="0" y="418" width="800" height="80"
        fill="url(#bg)" opacity="0.08"/>

  <!-- ─── VASE ─── -->
  <!-- Vase shadow on table -->
  <ellipse cx="195" cy="425" rx="64" ry="9" fill="rgba(0,0,0,0.07)"/>
  <!-- Vase neck -->
  <path d="M 178 350 L 185 330 L 205 330 L 212 350 Z" fill="url(#vase)"/>
  <rect x="181" y="326" width="28" height="8" rx="4" fill="#E8E3DC"/>
  <!-- Vase body (teardrop/sphere) -->
  <ellipse cx="195" cy="392" rx="74" ry="68" fill="url(#vase)" filter="url(#shadow)"/>
  <!-- Vase highlight -->
  <ellipse cx="172" cy="363" rx="22" ry="18" fill="white" opacity="0.28"/>
  <ellipse cx="165" cy="357" rx="8" ry="7" fill="white" opacity="0.18"/>
  <!-- Vase base cut -->
  <rect x="128" y="414" width="134" height="12" fill="url(#marble)"/>

  <!-- ─── FLOWERS (baby's breath) ─── -->
  <!-- Main branch stems -->
  <path d="M 193 330 C 188 295 175 258 162 208" fill="none" stroke="#96A882" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 195 330 C 200 288 218 250 238 198" fill="none" stroke="#96A882" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 193 330 C 180 295 148 268 122 228" fill="none" stroke="#8A9C76" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 196 330 C 208 290 250 262 278 230" fill="none" stroke="#8A9C76" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 193 330 C 186 308 160 292 140 268" fill="none" stroke="#96A882" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 196 330 C 204 305 235 290 255 265" fill="none" stroke="#96A882" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Extra fine branches -->
  <path d="M 175 270 C 168 255 158 240 148 225" fill="none" stroke="#96A882" stroke-width="1" stroke-linecap="round"/>
  <path d="M 210 265 C 218 250 228 238 242 222" fill="none" stroke="#96A882" stroke-width="1" stroke-linecap="round"/>
  <path d="M 163 240 C 155 228 142 218 132 208" fill="none" stroke="#8A9C76" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M 228 238 C 238 225 252 215 262 204" fill="none" stroke="#8A9C76" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Baby's breath flowers — top center cloud -->
  <g opacity="0.92">
    <circle cx="198" cy="168" r="3.2" fill="white"/><circle cx="210" cy="160" r="2.8" fill="white"/>
    <circle cx="222" cy="168" r="3" fill="#F8F5F0"/><circle cx="232" cy="162" r="2.5" fill="white"/>
    <circle cx="190" cy="162" r="2.5" fill="white"/><circle cx="205" cy="153" r="2.8" fill="white"/>
    <circle cx="216" cy="150" r="3" fill="#FBF9F5"/><circle cx="228" cy="155" r="2.5" fill="white"/>
    <circle cx="240" cy="163" r="2.8" fill="white"/><circle cx="185" cy="153" r="2.2" fill="white"/>
    <circle cx="244" cy="175" r="2.5" fill="#F8F5F0"/><circle cx="237" cy="152" r="2.2" fill="white"/>
    <circle cx="194" cy="178" r="2.5" fill="white"/><circle cx="248" cy="155" r="2" fill="white"/>
    <circle cx="179" cy="170" r="2.2" fill="white"/><circle cx="255" cy="168" r="2.5" fill="white"/>
    <!-- top arc fill -->
    <circle cx="200" cy="144" r="2" fill="white"/><circle cx="212" cy="141" r="2.5" fill="#FBF9F5"/>
    <circle cx="224" cy="143" r="2.2" fill="white"/><circle cx="235" cy="146" r="2" fill="white"/>
  </g>

  <!-- Left cluster -->
  <g opacity="0.88">
    <circle cx="124" cy="218" r="3" fill="white"/><circle cx="135" cy="210" r="2.5" fill="#F8F5F0"/>
    <circle cx="116" cy="210" r="2.2" fill="white"/><circle cx="143" cy="218" r="2.8" fill="white"/>
    <circle cx="128" cy="204" r="2.2" fill="white"/><circle cx="110" cy="220" r="2" fill="white"/>
    <circle cx="148" cy="210" r="2.2" fill="#FBF9F5"/><circle cx="120" cy="226" r="2.5" fill="white"/>
    <circle cx="138" cy="226" r="2" fill="white"/><circle cx="105" cy="212" r="2" fill="white"/>
  </g>

  <!-- Right cluster -->
  <g opacity="0.88">
    <circle cx="272" cy="222" r="3" fill="white"/><circle cx="284" cy="214" r="2.5" fill="#F8F5F0"/>
    <circle cx="262" cy="216" r="2.2" fill="white"/><circle cx="290" cy="224" r="2.8" fill="white"/>
    <circle cx="278" cy="208" r="2.2" fill="white"/><circle cx="295" cy="216" r="2" fill="white"/>
    <circle cx="268" cy="228" r="2.5" fill="#FBF9F5"/><circle cx="286" cy="230" r="2" fill="white"/>
    <circle cx="300" cy="226" r="2.2" fill="white"/><circle cx="255" cy="224" r="2" fill="white"/>
  </g>

  <!-- Mid-left flowers -->
  <g opacity="0.85">
    <circle cx="152" cy="260" r="2.8" fill="white"/><circle cx="162" cy="252" r="2.2" fill="white"/>
    <circle cx="144" cy="253" r="2" fill="#F8F5F0"/><circle cx="168" cy="262" r="2.5" fill="white"/>
    <circle cx="156" cy="246" r="2" fill="white"/><circle cx="140" cy="263" r="2.2" fill="white"/>
    <circle cx="172" cy="255" r="2" fill="white"/>
  </g>

  <!-- Mid-right flowers -->
  <g opacity="0.85">
    <circle cx="248" cy="256" r="2.8" fill="white"/><circle cx="258" cy="248" r="2.2" fill="white"/>
    <circle cx="240" cy="250" r="2" fill="#F8F5F0"/><circle cx="264" cy="258" r="2.5" fill="white"/>
    <circle cx="253" cy="244" r="2" fill="white"/><circle cx="235" cy="258" r="2.2" fill="white"/>
    <circle cx="268" cy="250" r="2" fill="white"/>
  </g>

  <!-- ─── TOWELS ─── -->
  <!-- Bottom towel -->
  <rect x="318" y="372" width="200" height="50" rx="9" fill="url(#towelBot)" filter="url(#shadow)"/>
  <!-- Texture lines -->
  <line x1="330" y1="385" x2="505" y2="385" stroke="#D8D4CE" stroke-width="0.7" opacity="0.5"/>
  <line x1="330" y1="394" x2="505" y2="394" stroke="#D8D4CE" stroke-width="0.7" opacity="0.35"/>
  <line x1="330" y1="403" x2="505" y2="403" stroke="#D8D4CE" stroke-width="0.5" opacity="0.25"/>
  <!-- Rolled ends -->
  <rect x="318" y="372" width="14" height="50" rx="7" fill="#EAE5DF"/>
  <rect x="504" y="372" width="14" height="50" rx="7" fill="#EAE5DF"/>
  <!-- Fold shadow top -->
  <rect x="318" y="372" width="200" height="6" rx="9" fill="rgba(0,0,0,0.04)"/>

  <!-- Top towel (ESNCLEAN) -->
  <rect x="326" y="326" width="184" height="50" rx="9" fill="url(#towelTop)" filter="url(#shadow)"/>
  <!-- Texture lines -->
  <line x1="338" y1="339" x2="496" y2="339" stroke="#D8D4CE" stroke-width="0.7" opacity="0.55"/>
  <line x1="338" y1="348" x2="496" y2="348" stroke="#D8D4CE" stroke-width="0.7" opacity="0.4"/>
  <line x1="338" y1="357" x2="496" y2="357" stroke="#D8D4CE" stroke-width="0.5" opacity="0.28"/>
  <!-- Rolled ends -->
  <rect x="326" y="326" width="14" height="50" rx="7" fill="#EFEBe4"/>
  <rect x="496" y="326" width="14" height="50" rx="7" fill="#EFEBe4"/>
  <!-- Fold shadow top -->
  <rect x="326" y="326" width="184" height="6" rx="9" fill="rgba(0,0,0,0.04)"/>
  <!-- ESNCLEAN embroidery -->
  <text x="418" y="356"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12.5"
        font-weight="400"
        letter-spacing="3.5"
        fill="#C4A055"
        text-anchor="middle"
        opacity="0.85">ESNCLEAN</text>

  <!-- Towel stack shadow on table -->
  <ellipse cx="418" cy="425" rx="95" ry="8" fill="rgba(0,0,0,0.07)"/>

  <!-- ─── SPRAY BOTTLE 1 (tall, left) ─── -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="548" y="248" width="58" height="172" rx="7" fill="url(#goldA)"/>
    <!-- Shine stripe -->
    <rect x="550" y="252" width="22" height="164" rx="5" fill="url(#goldShine)" opacity="0.7"/>
    <!-- Label zone -->
    <rect x="552" y="312" width="50" height="62" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="577" y="337"
          font-family="Georgia, serif" font-size="7" letter-spacing="1.5"
          fill="rgba(255,255,255,0.55)" text-anchor="middle">ESNCLEAN</text>
    <line x1="556" y1="344" x2="598" y2="344" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
    <text x="577" y="356"
          font-family="Georgia, serif" font-size="6" letter-spacing="1"
          fill="rgba(255,255,255,0.4)" text-anchor="middle">PREMIUM</text>
    <!-- Neck -->
    <rect x="560" y="232" width="34" height="22" rx="4" fill="url(#goldA)"/>
    <!-- Neck ring -->
    <rect x="555" y="246" width="44" height="7" rx="3" fill="#DEC070"/>
    <!-- Pump arm -->
    <path d="M 577 232 C 577 216 562 204 546 204 L 530 204"
          fill="none" stroke="#D4B860" stroke-width="9" stroke-linecap="round"/>
    <path d="M 577 232 C 577 216 562 204 546 204 L 530 204"
          fill="none" stroke="url(#goldShine)" stroke-width="9" stroke-linecap="round" opacity="0.5"/>
    <!-- Nozzle -->
    <rect x="519" y="200" width="20" height="8" rx="4" fill="#DEC070"/>
    <!-- Pump top cap -->
    <rect x="560" y="224" width="34" height="12" rx="5" fill="#DEC070"/>
    <!-- Bottom base -->
    <rect x="548" y="408" width="58" height="12" rx="6" fill="url(#goldA)"/>
  </g>
  <!-- Bottle 1 shadow -->
  <ellipse cx="577" cy="423" rx="32" ry="6" fill="rgba(0,0,0,0.08)"/>

  <!-- ─── SPRAY BOTTLE 2 (shorter, right) ─── -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="624" y="294" width="50" height="128" rx="6" fill="url(#goldB)"/>
    <!-- Shine -->
    <rect x="626" y="298" width="18" height="120" rx="4" fill="url(#goldShine)" opacity="0.6"/>
    <!-- Label zone -->
    <rect x="628" y="345" width="42" height="46" rx="3" fill="rgba(255,255,255,0.09)"/>
    <!-- Neck -->
    <rect x="634" y="277" width="30" height="22" rx="4" fill="url(#goldB)"/>
    <!-- Neck ring -->
    <rect x="629" y="290" width="40" height="7" rx="3" fill="#E0CA72"/>
    <!-- Pump arm -->
    <path d="M 649 277 C 649 262 636 252 622 252 L 608 252"
          fill="none" stroke="#D4B860" stroke-width="8" stroke-linecap="round"/>
    <path d="M 649 277 C 649 262 636 252 622 252 L 608 252"
          fill="none" stroke="url(#goldShine)" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
    <!-- Nozzle -->
    <rect x="597" y="248" width="18" height="7" rx="3.5" fill="#E0CA72"/>
    <!-- Pump top cap -->
    <rect x="634" y="269" width="30" height="12" rx="5" fill="#E0CA72"/>
    <!-- Bottom base -->
    <rect x="624" y="410" width="50" height="10" rx="5" fill="url(#goldB)"/>
  </g>
  <!-- Bottle 2 shadow -->
  <ellipse cx="649" cy="423" rx="28" ry="5.5" fill="rgba(0,0,0,0.07)"/>

  <!-- ─── SMALL FLOWER SPRIGS (right side accent) ─── -->
  <path d="M 720 340 C 718 315 712 295 705 272" fill="none" stroke="#96A882" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 720 340 C 724 312 730 292 738 268" fill="none" stroke="#96A882" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <g opacity="0.65">
    <circle cx="706" cy="264" r="2.5" fill="white"/><circle cx="716" cy="257" r="2" fill="white"/>
    <circle cx="726" cy="260" r="2.5" fill="#F8F5F0"/><circle cx="736" cy="264" r="2" fill="white"/>
    <circle cx="711" cy="251" r="2" fill="white"/><circle cx="722" cy="250" r="2.2" fill="white"/>
    <circle cx="733" cy="255" r="2" fill="white"/><circle cx="742" cy="270" r="2.2" fill="#F8F5F0"/>
    <circle cx="700" cy="272" r="2" fill="white"/><circle cx="745" cy="258" r="2" fill="white"/>
  </g>

  <!-- Final ambient overlay -->
  <rect width="800" height="620" fill="url(#ambient)" opacity="0.5"/>
</svg>
